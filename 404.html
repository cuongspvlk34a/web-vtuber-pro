<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Web VTuber Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0e17;
      color: #fffffe;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center;
      gap: 1rem;
    }
    .emoji { font-size: 5rem; }
    h1 { font-size: 2rem; color: #ff8906; }
    p  { color: #a7a9be; max-width: 360px; line-height: 1.6; }
    a  {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #ff8906;
      color: #0f0e17;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="emoji">🦊</div>
  <h1>404 — Page not found</h1>
  <p>The page you're looking for doesn't exist. Head back and start your VTuber session!</p>
  <a href="/">← Back to App</a>
</body>
</html>
