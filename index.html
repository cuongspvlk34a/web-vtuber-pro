<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- ============================================================
       META & CHARSET
       ============================================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Web VTuber Pro – Anime VTuber avatar driven by MediaPipe FaceLandmarker" />
  <title>Web VTuber Pro</title>

  <!-- ============================================================
       STYLESHEET
       FIX: Tên file đúng là style.css (khớp với file thực tế)
       ============================================================ -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ============================================================
       LOADING OVERLAY
       ============================================================ -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-title">Initializing MediaPipe...</p>
    <p class="loading-subtitle">Please allow camera access</p>
  </div>

  <!-- ============================================================
       APP CONTAINER — 3 cột: left-panel | canvas-container | right-panel
       ============================================================ -->
  <div id="app-container">

    <!-- LEFT PANEL: webcam ẩn -->
    <div id="left-panel">
      <video id="webcam" autoplay playsinline muted></video>
    </div>

    <!-- CANVAS CONTAINER -->
    <div id="canvas-container">
      <canvas id="vtube-canvas" width="640" height="480">
        Trình duyệt của bạn không hỗ trợ HTML5 Canvas.
      </canvas>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel">

      <!-- App Title -->
      <!-- FIX: Thêm id="app-title" và class đúng theo CSS -->
      <div id="app-title" class="glass-panel">
        <h1>Web VTuber Pro</h1>
        <p class="subtitle">Anime Face Tracking</p>
      </div>

      <!-- UI CONTROLS — Chọn skin nhân vật -->
      <!-- FIX: Thêm class="glass-panel" và cấu trúc con đúng theo CSS -->
      <div id="ui-controls" class="glass-panel">
        <div class="panel-title">Character Skin</div>
        <div class="skin-grid">
          <button class="skin-btn active" data-skin="cat">
            <span class="skin-emoji">🐱</span>
            <span class="skin-label">Cat</span>
            <span class="skin-indicator"></span>
          </button>
          <button class="skin-btn" data-skin="rabbit">
            <span class="skin-emoji">🐰</span>
            <span class="skin-label">Rabbit</span>
            <span class="skin-indicator"></span>
          </button>
          <button class="skin-btn" data-skin="fox">
            <span class="skin-emoji">🦊</span>
            <span class="skin-label">Fox</span>
            <span class="skin-indicator"></span>
          </button>
        </div>
      </div>

      <!-- EXPRESSION DISPLAY -->
      <!-- FIX: Thêm class="glass-panel" và class con đúng theo CSS -->
      <div id="expression-display" class="glass-panel">
        <div class="panel-title">Expression</div>
        <span class="expression-emoji" id="expression-icon">😊</span>
        <div class="expression-value" id="expression-text">Neutral</div>
      </div>

      <!-- ACTION BUTTONS — Mirror & Screenshot -->
      <!-- FIX: Thêm class="action-btn" và cấu trúc con đúng theo CSS -->
      <div id="action-buttons">
        <button id="mirror-btn" class="action-btn">
          <span class="btn-icon">🪞</span>
          Mirror
        </button>
        <button id="screenshot-btn" class="action-btn">
          <span class="btn-icon">📸</span>
          Screenshot
        </button>
      </div>

      <!-- STATS PANEL -->
      <!-- FIX: Thêm class="glass-panel" và cấu trúc stats-grid / stat-item / stat-label / stat-value -->
      <div id="stats-panel" class="glass-panel">
        <div class="panel-title">Performance</div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">FPS</span>
            <span class="stat-value" id="fps-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Landmarks</span>
            <span class="stat-value" id="landmark-count">0</span>
          </div>
        </div>
      </div>

      <!-- DEBUG TOGGLE BUTTON -->
      <button id="debug-toggle">🔍 Debug Panel</button>

      <!-- DEBUG PANEL -->
      <!-- FIX: Thêm class="glass-panel" và cấu trúc debug-content / debug-row / debug-key / debug-val -->
      <div id="debug-panel" style="display:none" class="glass-panel">
        <div class="panel-title">Debug Info</div>
        <div class="debug-content">
          <div class="debug-row">
            <span class="debug-key">EAR L</span>
            <span class="debug-val" id="ear-left">0.00</span>
          </div>
          <div class="debug-row">
            <span class="debug-key">EAR R</span>
            <span class="debug-val" id="ear-right">0.00</span>
          </div>
          <div class="debug-row">
            <span class="debug-key">MAR</span>
            <span class="debug-val" id="mar-value">0.00</span>
          </div>
          <div class="debug-row">
            <span class="debug-key">Tilt</span>
            <span class="debug-val" id="tilt-value">0.00</span>
          </div>
          <div class="debug-row">
            <span class="debug-key">Nose X</span>
            <span class="debug-val" id="nose-x">0.00</span>
          </div>
          <div class="debug-row">
            <span class="debug-key">Nose Y</span>
            <span class="debug-val" id="nose-y">0.00</span>
          </div>
        </div>
      </div>

    </div>
    <!-- /right-panel -->

  </div>
  <!-- /app-container -->

  <!-- ============================================================
       THƯ VIỆN MEDIAPIPE (CDN)
       Load vision_bundle trước tất cả JS nội bộ
       ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>

  <!-- ============================================================
       JS NỘI BỘ — Load đúng thứ tự bằng defer
       FIX: Tên file đúng khớp với file thực tế (không có hậu tố _2)
       1. facelandmark.js  → MediaPipe wrapper + EAR/MAR/tilt
       2. character.js     → Canvas renderer vẽ nhân vật
       3. effects.js       → Particle system
       4. ui.js            → UI controls handler
       5. app.js           → Khởi tạo + game loop chính (cuối cùng)
       ============================================================ -->
  <script src="js/facelandmark.js" defer></script>
  <script src="js/character.js"    defer></script>
  <script src="js/effects.js"      defer></script>
  <script src="js/ui.js"           defer></script>
  <script src="js/app.js"          defer></script>

</body>
</html>
